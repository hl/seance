name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx @tauri-apps/cli build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute DMG SHA256
        id: sha
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg)
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ steps.sha.outputs.dmg }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew cask
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/hl/homebrew-tap.git /tmp/homebrew-tap
          cat > /tmp/homebrew-tap/Casks/seance.rb << 'CASK'
          cask "seance" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/hl/seance/releases/download/v#{version}/Seance_#{version}_aarch64.dmg",
                verified: "github.com/hl/seance/"
            name "Séance"
            desc "Desktop session viewer"
            homepage "https://github.com/hl/seance"

            depends_on arch: :arm64

            app "Séance.app"

            postflight do
              system_command "/usr/bin/xattr", args: ["-cr", staged_path/"Séance.app"]
            end

            zap trash: [
              "~/Library/Application Support/com.seance.app",
              "~/Library/Caches/com.seance.app",
              "~/Library/Preferences/com.seance.app.plist",
              "~/Library/Saved Application State/com.seance.app.savedState",
            ]
          end
          CASK
          sed -i '' "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/" /tmp/homebrew-tap/Casks/seance.rb
          sed -i '' "s/SHA256_PLACEHOLDER/${{ steps.sha.outputs.sha256 }}/" /tmp/homebrew-tap/Casks/seance.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/seance.rb
          git commit -m "Update seance cask to ${{ steps.version.outputs.version }}"
          git push
